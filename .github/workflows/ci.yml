name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Drop local-only dev package source (absent in CI)
        run: dotnet nuget remove source local-flame --configfile nuget.config

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Test with coverage
        run: dotnet test tests/Firefly.Tests --no-build -c Release --collect:"XPlat Code Coverage" --logger "trx;LogFileName=results.trx"

      - name: Test example apps
        run: |
          dotnet test examples/todo-api.tests --no-build -c Release
          dotnet test examples/blog-api.tests --no-build -c Release
          dotnet test examples/url-shortener.tests --no-build -c Release
          dotnet test examples/todo-api-db.tests --no-build -c Release

      - name: Generate coverage report
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          dotnet tool install -g dotnet-reportgenerator-globaltool
          reportgenerator -reports:"tests/Firefly.Tests/TestResults/*/coverage.cobertura.xml" -targetdir:"coverage" -reporttypes:TextSummary
          cat coverage/Summary.txt

  # Deploys the website to Vercel ONLY after build-and-test passes.
  deploy-website:
    name: Deploy website
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Deploy to Vercel (production)
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "VERCEL_TOKEN secret is not set — skipping deploy."
            echo "Add it once with: gh secret set VERCEL_TOKEN --repo rodrigovidal/firefly"
            exit 0
          fi
          npm install -g vercel@latest
          vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
          vercel build --prod --token="$VERCEL_TOKEN"
          vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
