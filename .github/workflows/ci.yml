name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Test with coverage
        run: dotnet test tests/Fire.Tests --no-build -c Release --collect:"XPlat Code Coverage" --logger "trx;LogFileName=results.trx"

      - name: Test example apps
        run: |
          dotnet test examples/todo-api.tests --no-build -c Release
          dotnet test examples/blog-api.tests --no-build -c Release
          dotnet test examples/url-shortener.tests --no-build -c Release
          dotnet test examples/todo-api-db.tests --no-build -c Release

      - name: Generate coverage report
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          dotnet tool install -g dotnet-reportgenerator-globaltool
          reportgenerator -reports:"tests/Fire.Tests/TestResults/*/coverage.cobertura.xml" -targetdir:"coverage" -reporttypes:TextSummary
          cat coverage/Summary.txt

      - name: Check coverage threshold
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          COVERAGE=$(grep "Line coverage" coverage/Summary.txt | grep -oP '\d+\.?\d*')
          echo "Line coverage: ${COVERAGE}%"
          if (( $(echo "$COVERAGE < 95" | bc -l) )); then
            echo "Coverage dropped below 95%!"
            exit 1
          fi
