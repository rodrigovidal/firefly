name: Publish to NuGet

on:
  push:
    tags:
      - 'v*'  # e.g. v0.1.0-alpha.3

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write     # required for OIDC token (NuGet trusted publishing)
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Validate tag matches project version
        env:
          TAG_VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          PROJECT_VERSION=$(sed -n 's:.*<Version>\(.*\)</Version>.*:\1:p' src/Fire/Fire.fsproj)
          if [ "$PROJECT_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match Fire.fsproj (<Version>$PROJECT_VERSION</Version>)"
            exit 1
          fi

      - name: Pack
        run: dotnet pack src/Fire/Fire.fsproj -c Release -o ./artifacts

      - name: NuGet login (OIDC)
        id: login
        uses: NuGet/login@v1
        with:
          user: ${{ secrets.NUGET_USER }}  # nuget.org profile name, NOT email

      - name: Push to NuGet
        run: dotnet nuget push ./artifacts/*.nupkg --api-key ${{ steps.login.outputs.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
